version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    container_name: dockerpanel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/data:/app/data
    environment:
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-docker-panel-secret}
      - DATABASE_URL=/app/data/dockerpanel.db
    networks:
      - dockerpanel

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dockerpanel-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - dockerpanel

networks:
  dockerpanel:
    driver: bridge
